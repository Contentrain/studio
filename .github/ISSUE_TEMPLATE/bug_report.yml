name: Bug Report
description: Report a reproducible bug in Contentrain Studio
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions for duplicates.
          required: true
  - type: input
    id: version
    attributes:
      label: Studio version
      description: Release tag, Docker image tag, or commit SHA.
      placeholder: v0.1.0 / main / 1a2b3c4d
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local development
        - Self-hosted Docker
        - Self-hosted Kubernetes
        - Self-hosted VM / bare metal
        - Other
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Not applicable (server-side / API)
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Required for local development and self-hosted debugging.
      placeholder: 22.0.0
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, logs, or request payloads.
    validations:
      required: false
