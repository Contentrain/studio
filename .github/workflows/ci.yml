name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Lint commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Generate Contentrain client
        run: npx contentrain generate

      - name: Lint
        run: pnpm lint
        
      - name: Typecheck
        run: pnpm typecheck

      - name: Start local Supabase DB
        run: pnpm dlx supabase start --yes --workdir . --exclude gotrue,realtime,storage-api,imgproxy,kong,mailpit,postgrest,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Test
        run: pnpm test:ci

      - name: Test RLS
        run: pnpm test:rls

      - name: Install Playwright browsers
        run: pnpm exec playwright-core install --with-deps chromium

      - name: Test E2E
        run: pnpm test:e2e

      - name: Build
        run: pnpm build
